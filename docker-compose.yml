services:
  mongo:
    image: mongo:7
    container_name: threatlens-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # No host port — avoids conflict with other local MongoDB instances.
    # Backend connects via Docker network: mongodb://mongo:27017/threatlens
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: threatlens-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/threatlens
      JWT_SECRET: ${JWT_SECRET:-change-me-docker-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SIMULATOR_API_KEY: ${SIMULATOR_API_KEY:-simulator-docker-key}
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build:
      context: ./ai-service
    container_name: threatlens-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: threatlens-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
